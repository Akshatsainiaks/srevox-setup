# ═══════════════════════════════════════════════════════════════
#  Srevox — Self-Hosted
#  https://github.com/Akshatsainiaks/srevox
#
#  Usage:
#    curl -fsSL https://raw.githubusercontent.com/Akshatsainiaks/srevox/main/setup.sh | bash
# ═══════════════════════════════════════════════════════════════

services:

  postgres:
    image: postgres:16-alpine
    container_name: srevox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-srevox}
      POSTGRES_USER:     ${POSTGRES_USER:-srevox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-srevox}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - srevox

  redis:
    image: redis:7-alpine
    container_name: srevox-redis
    restart: unless-stopped
    command: redis-server --bind 0.0.0.0 --protected-mode no
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - srevox

  api:
    image: akshatsaini08/srevox-api:v0.1.18
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: srevox-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-4000}:4000"
    env_file: .env
    environment:
      POSTGRES_HOST:     ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT:     ${POSTGRES_PORT:-5432}
      POSTGRES_DB:       ${POSTGRES_DB:-srevox}
      POSTGRES_USER:     ${POSTGRES_USER:-srevox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL:     redis://redis:6379
      AI_SERVICE_URL: http://ai:8000
      ALERT_WORKER_URL: http://worker:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - srevox

  worker:
    image: akshatsaini08/srevox-worker:v0.1.18
    build:
      context: ./apps/alert-worker
      dockerfile: Dockerfile
    container_name: srevox-worker
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST:     ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT:     ${POSTGRES_PORT:-5432}
      POSTGRES_DB:       ${POSTGRES_DB:-srevox}
      POSTGRES_USER:     ${POSTGRES_USER:-srevox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL:     redis://redis:6379
      AI_SERVICE_URL: http://ai:8000
      ALERT_WORKER_URL: http://worker:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - srevox

  ai:
    image: akshatsaini08/srevox-ai:v0.1.18
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: srevox-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      POSTGRES_HOST:     ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT:     ${POSTGRES_PORT:-5432}
      POSTGRES_DB:       ${POSTGRES_DB:-srevox}
      POSTGRES_USER:     ${POSTGRES_USER:-srevox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - srevox

  activity:
    image: akshatsaini08/srevox-activity:v0.1.18
    build:
      context: ./apps/activity-service
      dockerfile: Dockerfile
    container_name: srevox-activity
    restart: unless-stopped
    ports:
      - "${ACTIVITY_PORT:-5005}:5005"
    env_file: .env
    environment:
      POSTGRES_HOST:     ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT:     ${POSTGRES_PORT:-5432}
      POSTGRES_DB:       ${POSTGRES_DB:-srevox}
      POSTGRES_USER:     ${POSTGRES_USER:-srevox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - srevox

  frontend:
    image: akshatsaini08/srevox-frontend:v0.1.18
    container_name: srevox-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      API_URL: http://api:4000
      ACTIVITY_SERVICE_URL: http://activity:5005
    depends_on:
      - api
      - activity
    networks:
      - srevox

volumes:
  postgres_data:
  redis_data:

networks:
  srevox:
    driver: bridge
